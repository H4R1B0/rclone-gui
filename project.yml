name: RcloneGUI
options:
  bundleIdPrefix: com.rclone-gui
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  RcloneKit:
    path: Packages/RcloneKit
  FileBrowser:
    path: Packages/FileBrowser
  TransferEngine:
    path: Packages/TransferEngine

targets:
  RcloneGUI:
    type: application
    platform: macOS
    sources:
      - path: RcloneGUI
        excludes:
          - "**/.DS_Store"
          - "**/.build"
          - "**/.swiftpm"
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rclone-gui.RcloneGUI
        PRODUCT_NAME: RcloneGUI
        MARKETING_VERSION: "1.4.3"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: RcloneGUI/Info.plist
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Resources/lib"
        OTHER_LDFLAGS:
          - "-lrclone"
    dependencies:
      - package: RcloneKit
      - package: FileBrowser
      - package: TransferEngine
    postCompileScripts:
      - script: |
          # Copy librclone.dylib to Frameworks
          DYLIB_SRC="${PROJECT_DIR}/Resources/lib/librclone.dylib"
          DYLIB_DST="${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          if [ -f "$DYLIB_SRC" ]; then
            mkdir -p "$DYLIB_DST"
            cp "$DYLIB_SRC" "$DYLIB_DST/"
            install_name_tool -id "@rpath/librclone.dylib" "$DYLIB_DST/librclone.dylib"
          fi
        name: Copy librclone.dylib
        basedOnDependencyAnalysis: false

  RcloneGUITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RcloneGUITests
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Resources/lib"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@loader_path/../Frameworks"
    dependencies:
      - target: RcloneGUI
      - package: RcloneKit
      - package: FileBrowser
      - package: TransferEngine
