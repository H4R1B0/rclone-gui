appId: com.rclone-gui.app
productName: Rclone GUI
directories:
  buildResources: build
  output: dist-release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - "**/*"
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  hardenedRuntime: true
dmg:
  artifactName: "${productName}-${version}-${arch}.dmg"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
